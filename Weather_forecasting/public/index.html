<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Forecast</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="app-title">Weather Forecast</h1>

        <form class="search-box" id="search-form" autocomplete="off">
            <input type="text" placeholder="Enter your location" class="input-box" id="city-input" required>
            <button type="submit" class="fa-solid fa-magnifying-glass" id="search-button" aria-label="Search"></button>
            <button type="button" id="location-button" title="Use current location"><i class="fa-solid fa-location-crosshairs"></i></button>
        </form>

        <div class="toggles">
            <button id="toggle-unit" class="btn-secondary">Show °F</button>
            <button id="toggle-theme" class="btn-secondary">Dark Mode</button>
        </div>

        <div class="status-message hidden" id="status-message"></div>
        <div class="loading hidden" id="loading">Loading weather data...</div>

        <div class="location-not-found hidden" id="location-not-found">
            <h2>Sorry, Location Not Found</h2>
            <img src="image/404.png" alt="404 Error">
        </div>

        <div class="weather-body hidden" id="weather-body">
            <img src="image/cloud.png" alt="Weather Image" class="Weather-img" id="weather-img">

            <div class="weather-box">
                <p class="temp" id="temp-value">0<sup>°C</sup></p>
                <p class="description" id="description">light rain</p>
            </div>

            <div class="weather-details">
                <div class="detail-item">
                    <i class="fa-solid fa-droplet"></i>
                    <div class="text"><span id="humidity">45%</span><p>Humidity</p></div>
                </div>
                <div class="detail-item">
                    <i class="fa-solid fa-wind"></i>
                    <div class="text"><span id="wind-speed">12 km/h</span><p>Wind Speed</p></div>
                </div>
                <div class="detail-item">
                    <i class="fa-solid fa-temperature-three-quarters"></i>
                    <div class="text"><span id="feels-like">0°</span><p>Feels Like</p></div>
                </div>
            </div>

            <div class="extra-details">
                <p id="coords"></p>
                <p id="pressure"></p>
                <p id="sunrise"></p>
                <p id="sunset"></p>
                <p id="wind-deg"></p>
            </div>
        </div>

        <section class="forecast-section hidden" id="forecast-section">
            <h2>3-Day Forecast</h2>
            <div class="forecast-cards" id="forecast-cards"></div>
        </section>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
